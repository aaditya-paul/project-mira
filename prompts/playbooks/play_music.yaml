name: play_music
description: "Play music on YouTube Music in the browser"

triggers:
  - "play {song}"
  - "play music"
  - "play {song} on youtube music"
  - "play some music"
  - "put on {song}"
  - "listen to {song}"

variables:
  song:
    description: "The song, artist, or genre to play. If empty, just open YouTube Music."
    required: false
    default: ""
  browser:
    description: "Which browser to use"
    default: "Brave Browser"

steps:
  # STEP 1: Navigate to YouTube Music via Playwright
  - action: browser_navigate
    params:
      url: "music.youtube.com"
    description: "Open YouTube Music via Playwright CDP"
    expect: "ytmusic_loaded"
    risk_level: "low"
    notes: >
      Playwright navigates directly — no switching apps, no ctrl+l, no typing URLs.
      If the browser isn't running, it auto-launches in debug mode first.

  # STEP 2: Type song into search (if specified)
  - action: browser_type
    params:
      selector: "input[aria-label='Search']"
      text: "{song}"
    description: "Type song into YouTube Music search bar"
    expect: "search_typed"
    risk_level: "low"
    condition: "song_specified"
    notes: >
      YouTube Music has a search input with aria-label="Search".
      Playwright finds it by selector — no need for "/" shortcut or vision.

  # STEP 3: Execute search
  - action: browser_press_key
    params:
      key: "Enter"
    description: "Execute search"
    expect: "results_loaded"
    risk_level: "low"
    condition: "song_specified"

  # STEP 4: Wait for search results list
  - action: browser_wait_for
    params:
      selector: "ytmusic-card-shelf-renderer a[href*='watch?v='], ytmusic-responsive-list-item-renderer a[href*='watch?v=']"
      timeout: 15
    description: "Wait for search results to render"
    expect: "results_visible"
    risk_level: "low"
    condition: "song_specified"

  # STEP 5: Click first result to play
  - action: browser_click
    params:
      selector: "ytmusic-card-shelf-renderer a[href*='watch?v=']"
    description: "Click the first search result to start playback"
    expect: "music_playing"
    risk_level: "medium"
    condition: "song_specified"
    notes: >
      Targets the top card-shelf watch link first (usually the true top result).
      If that fails, browser_click falls back to play buttons, song list links,
      and finally the first global watch-link on the page.

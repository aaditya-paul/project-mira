name: adjust_volume
description: "Adjust system volume using PowerShell and Core Audio API"

triggers:
  - "change volume to {level}"
  - "set volume to {level}"
  - "adjust volume to {level}"
  - "volume to {level}"

variables:
  level:
    description: "Volume level (0-100)"
    required: true

steps:
  - action: run_command
    params:
      shell: "powershell"
      timeout_seconds: 30
      command: |
        Add-Type -TypeDefinition @'
        using System;
        using System.Runtime.InteropServices;

        [Guid("5CDF2C82-841E-4546-9722-0CF74078229A"), InterfaceType(ComInterfaceType.InterfaceIsIUnknown)]
        interface IAudioEndpointVolume {
          int RegisterControlChangeNotify(IntPtr pNotify);
          int UnregisterControlChangeNotify(IntPtr pNotify);
          int GetChannelCount(out uint channelCount);
          int SetMasterVolumeLevel(float levelDB, Guid eventContext);
          int SetMasterVolumeLevelScalar(float level, Guid eventContext);
          int GetMasterVolumeLevel(out float levelDB);
          int GetMasterVolumeLevelScalar(out float level);
          int SetChannelVolumeLevel(uint channelNumber, float levelDB, Guid eventContext);
          int SetChannelVolumeLevelScalar(uint channelNumber, float level, Guid eventContext);
          int GetChannelVolumeLevel(uint channelNumber, out float levelDB);
          int GetChannelVolumeLevelScalar(uint channelNumber, out float level);
          int SetMute([MarshalAs(UnmanagedType.Bool)] bool isMuted, Guid eventContext);
          int GetMute(out bool isMuted);
          int GetVolumeStepInfo(out uint step, out uint stepCount);
          int VolumeStepUp(Guid eventContext);
          int VolumeStepDown(Guid eventContext);
          int QueryHardwareSupport(out uint hardwareSupportMask);
          int GetVolumeRange(out float volumeMin, out float volumeMax, out float volumeStep);
        }

        [Guid("D666063F-1587-4E43-81F1-B948E807363F"), InterfaceType(ComInterfaceType.InterfaceIsIUnknown)]
        interface IMMDevice {
          int Activate(ref Guid iid, int clsCtx, IntPtr activationParams, [MarshalAs(UnmanagedType.Interface)] out object endpointVolume);
        }

        [Guid("A95664D2-9614-4F35-A746-DE8DB63617E6"), InterfaceType(ComInterfaceType.InterfaceIsIUnknown)]
        interface IMMDeviceEnumerator {
          int NotImpl1();
          int GetDefaultAudioEndpoint(int dataFlow, int role, out IMMDevice device);
        }

        [ComImport, Guid("BCDE0395-E52F-467C-8E3D-C4579291692E")]
        class MMDeviceEnumeratorComObject {}

        public static class VolumeProgram {
          public static void SetVolume(float levelScalar) {
            levelScalar = Math.Max(0.0f, Math.Min(1.0f, levelScalar));

            var enumerator = (IMMDeviceEnumerator)(new MMDeviceEnumeratorComObject());
            IMMDevice device;
            Marshal.ThrowExceptionForHR(enumerator.GetDefaultAudioEndpoint(0, 1, out device));

            object endpointObj;
            Guid iid = typeof(IAudioEndpointVolume).GUID;
            Marshal.ThrowExceptionForHR(device.Activate(ref iid, 23, IntPtr.Zero, out endpointObj));

            var endpoint = (IAudioEndpointVolume)endpointObj;
            Marshal.ThrowExceptionForHR(endpoint.SetMasterVolumeLevelScalar(levelScalar, Guid.Empty));
          }
        }
        '@

        $target = [Math]::Max(0, [Math]::Min(100, [int]({level})))
        [VolumeProgram]::SetVolume($target / 100.0)
    description: "Set system volume using Core Audio API"
    expect: "volume_set"
    risk_level: "low"

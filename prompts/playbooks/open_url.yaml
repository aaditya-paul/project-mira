name: open_url
description: "Open a website or URL in the default web browser"

triggers:
  - "open {url}"
  - "go to {url}"
  - "navigate to {url}"
  - "browse {url}"
  - "check my emails"
  - "check emails"
  - "open gmail"
  - "open youtube"
  - "open my mail"
  - "visit {url}"

# So the user can say "check my emails" and we know that means gmail.com
url_aliases:
  emails: "gmail.com"
  email: "gmail.com"
  mail: "gmail.com"
  my emails: "gmail.com"
  my email: "gmail.com"
  my mail: "gmail.com"
  gmail: "gmail.com"
  youtube: "youtube.com"
  yt: "youtube.com"
  music: "music.youtube.com"
  search: "duckduckgo.com"
  duckduckgo: "duckduckgo.com"
  google: "google.com"
  github: "github.com"
  reddit: "reddit.com"
  twitter: "x.com"
  x: "x.com"
  instagram: "instagram.com"
  insta: "instagram.com"
  facebook: "facebook.com"
  fb: "facebook.com"
  linkedin: "linkedin.com"
  whatsapp web: "web.whatsapp.com"
  netflix: "netflix.com"
  amazon: "amazon.com"
  spotify: "open.spotify.com"

variables:
  url:
    description: "The URL or website name to navigate to"
    required: true
  browser:
    description: "Which browser to use"
    default: "Brave Browser"

steps:
  #
  # STEP 1: Navigate directly via Playwright CDP
  # ─────────────────────────────────────────────
  # This is the ONLY step needed. Playwright connects to the browser
  # via CDP (Chrome DevTools Protocol) and navigates programmatically.
  # No ctrl+l, no typing, no enter — just instant navigation.
  #
  # If the browser is not running, the browser controller will
  # automatically launch it in debug mode first.
  #
  - action: browser_navigate
    params:
      url: "{url}"
    description: "Navigate to {url} via Playwright CDP"
    expect: "page_loaded"
    risk_level: "low"
    notes: >
      Playwright navigates the browser DIRECTLY via CDP — no keyboard
      interaction needed. The browser controller handles:
        1. Launching the browser in debug mode (if not already running)
        2. Connecting via CDP on port 9222
        3. Navigating the active tab to the URL
        4. Waiting for the page to load (domcontentloaded)
      
      This is vastly more reliable than ctrl+l → type → enter because:
        - No risk of typing into the wrong field
        - No autocomplete interference
        - No need to wait for address bar focus
        - Works even if a dialog/popup is blocking keyboard input
      
      The browser uses the user's real profile directory, so all cookies,
      saved passwords, and extensions are available — no cold login needed.

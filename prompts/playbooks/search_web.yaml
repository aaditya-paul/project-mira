name: search_web
description: "Search for something on the web using DuckDuckGo"

triggers:
  - "search for {query}"
  - "search {query}"
  - "look up {query}"
  - "google {query}"
  - "find {query} online"
  - "what is {query}"
  - "how to {query}"

variables:
  query:
    description: "The search query text"
    required: true
  browser:
    description: "Which browser to use"
    default: "Brave Browser"

steps:
  #
  # STEP 1: Navigate to DuckDuckGo via Playwright
  #
  - action: browser_navigate
    params:
      url: "duckduckgo.com"
    description: "Open DuckDuckGo via Playwright CDP"
    expect: "duckduckgo_loaded"
    risk_level: "low"
    notes: >
      Playwright navigates directly — no ctrl+l, no typing, no enter.
      DuckDuckGo is the user's default search engine.

  #
  # STEP 2: Type search query into the search box
  #
  - action: browser_type
    params:
      selector: "input[name='q']"
      text: "{query}"
    description: "Type the search query into the search box"
    expect: "query_typed"
    risk_level: "low"
    notes: >
      DuckDuckGo's search input has name="q".
      Playwright finds it by CSS selector and types directly.
      No need to wait for auto-focus or click the search bar.

  #
  # STEP 3: Execute search
  #
  - action: browser_press_key
    params:
      key: "Enter"
    description: "Press Enter to search"
    expect: "search_results_visible"
    risk_level: "low"
    notes: >
      Results should appear. Much faster than the old 6-step approach
      (switch_to_app → ctrl+l → type URL → enter → type query → enter).
